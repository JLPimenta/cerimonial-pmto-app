name: Build Homologação (APK)

on:
  push:
    branches: [main, develop, homologacao]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Versão (ex: 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build-android:
    name: Android APK – Homologação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Cache Gradle wrapper binary (~120MB, evita download a cada run)
      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}

      # Cache dependências Maven/Gradle (~500MB+, o maior gargalo)
      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-caches-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-caches-

      # Cache Android Build outputs (reutiliza compilação incremental entre runs)
      - name: Cache Android build
        uses: actions/cache@v4
        with:
          path: android/app/build
          key: android-build-${{ hashFiles('android/**', 'package-lock.json', 'app.json') }}
          restore-keys: |
            android-build-

      - name: Install dependencies
        run: npm ci

      - name: Expo Prebuild (Android)
        env:
          APP_ENV: homologacao
        run: npx expo prebuild --platform android --no-install --clean

      - name: Patch gradle.properties (memory + paralelismo)
        working-directory: android
        run: |
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          echo "org.gradle.caching=true" >> gradle.properties

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: android
        env:
          APP_ENV: homologacao
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          EXPO_PROJECT_ROOT: ${{ github.workspace }}
        run: ./gradlew assembleRelease --no-daemon --info 2>&1 | tee /tmp/gradle-build.log; exit ${PIPESTATUS[0]}

      - name: Rename APK
        run: |
          VERSION="${{ github.event.inputs.version_name || '1.0.0' }}"
          DATE=$(date +'%Y%m%d')
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          NEW_NAME="cerimonial-pmto-homologacao-v${VERSION}-${DATE}.apk"
          cp "$APK_PATH" "$NEW_NAME"
          echo "APK_FILE=$NEW_NAME" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-Homologacao
          path: ${{ env.APK_FILE }}
          retention-days: 30

      - name: Build summary
        run: |
          echo "## ✅ Build concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Arquivo:** \`${{ env.APK_FILE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Baixe o APK em **Actions → este workflow → Artifacts**." >> $GITHUB_STEP_SUMMARY

name: Build Homologação (APK)

on:
  push:
    branches: [main, develop, homologacao]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Versão (ex: 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build-android:
    name: Android APK – Homologação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'                   # cache npm via package-lock.json (~1-2 min economizados)

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Cache NDK 27 (~1GB, maior download unitário da pipeline)
      # Chave fixa porque a versão do NDK não muda entre commits normais
      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/27.1.12297006
          key: android-ndk-27.1.12297006

      # Cache Gradle wrapper binary (~120MB)
      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}

      # Cache dependências Maven/Gradle (~500MB+)
      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-caches-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-caches-

      - name: Install dependencies
        run: npm ci

      - name: Expo Prebuild (Android)
        env:
          APP_ENV: homologacao
        run: npx expo prebuild --platform android --no-install --clean

      - name: Patch gradle.properties (memory + paralelismo)
        working-directory: android
        run: |
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          echo "org.gradle.caching=true" >> gradle.properties

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      # O ExpoAutolinkingPlugin executa node com workingDir=android/ e chama:
      #   require('expo/bin/autolinking')
      # O Node resolve require() a partir do workingDir. Como android/ não tem
      # node_modules próprio, criamos um symlink para o node_modules da raiz.
      - name: Symlink node_modules para android/
        run: ln -sf ${{ github.workspace }}/node_modules ${{ github.workspace }}/android/node_modules

      - name: Build Release APK
        working-directory: android
        env:
          APP_ENV: homologacao
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          EXPO_PROJECT_ROOT: ${{ github.workspace }}
        run: ./gradlew assembleRelease --no-daemon --info 2>&1

      - name: Rename APK
        run: |
          VERSION="${{ github.event.inputs.version_name || '1.0.0' }}"
          DATE=$(date +'%Y%m%d')
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          NEW_NAME="cerimonial-pmto-homologacao-v${VERSION}-${DATE}.apk"
          cp "$APK_PATH" "$NEW_NAME"
          echo "APK_FILE=$NEW_NAME" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-Homologacao
          path: ${{ env.APK_FILE }}
          retention-days: 30

      - name: Upload Build Reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            android/build/reports
            android/app/build/reports
          retention-days: 7

      - name: Build summary
        run: |
          echo "## ✅ Build concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Arquivo:** \`${{ env.APK_FILE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Baixe o APK em **Actions → este workflow → Artifacts**." >> $GITHUB_STEP_SUMMARY

name: Build Homologação (APK)

on:
  push:
    branches: [main, develop, homologacao]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Versão (ex: 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build-android:
    name: Android APK – Homologação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'                   # cache npm via package-lock.json (~1-2 min economizados)

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Cache NDK 27 (~1GB, maior download unitário da pipeline)
      # Chave fixa porque a versão do NDK não muda entre commits normais
      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/27.1.12297006
          key: android-ndk-27.1.12297006

      # Cache Gradle wrapper binary (~120MB)
      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}

      # Cache dependências Maven/Gradle (~500MB+)
      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-caches-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-caches-

      - name: Install dependencies
        run: npm ci

      - name: Expo Prebuild (Android)
        env:
          APP_ENV: homologacao
        run: npx expo prebuild --platform android --no-install --clean

      - name: Patch gradle.properties (memory + paralelismo)
        working-directory: android
        run: |
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          echo "org.gradle.caching=true" >> gradle.properties

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      # Executa manualmente o mesmo script Node que o ExpoAutolinkingPlugin
      # chama durante a fase de configuração do Gradle.
      # Mantido para diagnóstico; remover após o build estabilizar.
      - name: Diagnose – Expo autolinking (pre-Gradle check)
        env:
          EXPO_PROJECT_ROOT: ${{ github.workspace }}
        run: |
          AUTOLINKING_SCRIPT="${{ github.workspace }}/node_modules/expo-modules-autolinking/build/index.js"
          if [ -f "$AUTOLINKING_SCRIPT" ]; then
            echo "✅ Script encontrado"
          else
            echo "❌ Script NÃO encontrado em: $AUTOLINKING_SCRIPT"
            ls "${{ github.workspace }}/node_modules/expo-modules-autolinking/" 2>&1 || echo "Pacote não encontrado"
            exit 1
          fi
          node "$AUTOLINKING_SCRIPT" android-resolve \
            --project-root "${{ github.workspace }}" \
            --json 2>&1 \
            && echo "✅ Autolinking OK" \
            || (echo "❌ Autolinking FALHOU com exit code $?" && exit 1)

      - name: Build Release APK
        working-directory: android
        env:
          APP_ENV: homologacao
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          EXPO_PROJECT_ROOT: ${{ github.workspace }}
        # --warn: mantém logs de erro sem o overhead massivo de --info
        run: ./gradlew assembleRelease --no-daemon --warn

      - name: Rename APK
        run: |
          VERSION="${{ github.event.inputs.version_name || '1.0.0' }}"
          DATE=$(date +'%Y%m%d')
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          NEW_NAME="cerimonial-pmto-homologacao-v${VERSION}-${DATE}.apk"
          cp "$APK_PATH" "$NEW_NAME"
          echo "APK_FILE=$NEW_NAME" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-Homologacao
          path: ${{ env.APK_FILE }}
          retention-days: 30

      - name: Build summary
        run: |
          echo "## ✅ Build concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Arquivo:** \`${{ env.APK_FILE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Baixe o APK em **Actions → este workflow → Artifacts**." >> $GITHUB_STEP_SUMMARY
